           C10 90, 10 50, 60 60
           C110 70, 70 120, 90 140" fill="none" stroke="#F28C28" stroke-width="18" stroke-linecap="round"></path>

  <!-- Body -->
  <ellipse cx="150" cy="110" rx="55" ry="35" fill="#FFA94D"></ellipse>

  <!-- Head -->
  <circle cx="200" cy="95" r="30" fill="#FFA94D"></circle>

  <!-- Belly highlight -->
