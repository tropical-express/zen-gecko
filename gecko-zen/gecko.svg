  <!-- Eyes -->
  <circle cx="190" cy="90" r="8" fill="white"></circle>
  <circle cx="210" cy="90" r="8" fill="white"></circle>
  <circle cx="190" cy="92" r="4" fill="#222"></circle>
  <circle cx="210" cy="92" r="4" fill="#222"></circle>

  <!-- Smile -->
  <path d="M185 105 Q200 115 215 105" stroke="#A64B00" stroke-width="3" fill="none" stroke-linecap="round"></path>

  <!-- Legs -->
  <ellipse cx="120" cy="145" rx="15" ry="8" fill="#F28C28"></ellipse>
  <ellipse cx="180" cy="145" rx="15" ry="8" fill="#F28C28"></ellipse>
  <ellipse cx="120" cy="75" rx="15" ry="8" fill="#F28C28"></ellipse>
  <ellipse cx="180" cy="75" rx="15" ry="8" fill="#F28C28"></ellipse>

</svg>